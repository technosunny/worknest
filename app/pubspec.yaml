name: worknest_app
description: "HR360Flow - Employee Attendance App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP client
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.3

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Camera
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # Fonts & UI
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # Image display
  cached_network_image: ^3.4.1

  # Web camera support
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#2563eb"
  adaptive_icon_foreground: "assets/icon/icon.png"
