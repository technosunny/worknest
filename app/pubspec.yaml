name: worknest_app
description: "WorkNest HR - Employee Attendance App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP client
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.3

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Camera
  image_picker: ^1.1.2

  # Fonts & UI
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # Image display
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
